name: ci
on: [push, pull_request]
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      # Phase-2 re-substrate guard: `Zero`/`One` resolve through
      # `deep_causality_num`. This catches num's `One`/`Zero` being brought into
      # scope as usable identities — unaliased braced/single imports (incl.
      # multi-line, via `-U`) AND qualified call sites (`num::Zero::zero()`,
      # `<T as num::Zero>`). `\bnum::` is anchored so `deep_causality_num::` is
      # not matched, and the `(?!\s+as)` lookahead skips deliberately *aliased*
      # forms (z.rs's `One as NumOne` for inner BigInt arithmetic), so z.rs
      # needs no exclusion and a future *unaliased* stray there is still caught.
      # Only temperley_lieb.rs + linear_combination.rs legitimately import num's
      # unaliased One/Zero (the num::Complex<i32> coefficient substrate); the
      # real invariant is enforced at compile time by
      # catgraph-applied/tests/rig_dc_substrate.rs — this guard is a supplement.
      - name: grep-guard num::{One,Zero}
        run: |
          matches=$(rg -n -U -P \
            -e '\bnum::\{[^}]*\b(?:One|Zero)\b(?!\s+as)' \
            -e '\buse\s+num::(?:One|Zero)\b' \
            -e '\bnum::(?:One|Zero)::' \
            -e '\bas\s+num::(?:One|Zero)\b' \
            catgraph-applied/src \
            -g '!temperley_lieb.rs' -g '!linear_combination.rs' || true)
          if [ -n "$matches" ]; then
            echo "::error::num's One/Zero used outside the re-substrate exception list:"
            echo "$matches"
            exit 1
          fi
          echo "grep-guard ok: no stray num::{One,Zero}"
      # #111: audit-doc tallies (summary tables, headline %, "(N tests)"
      # citations) are hand-maintained and drifted twice before Phase 1 of the
      # paper audit caught them. This recomputes them from the docs themselves.
      # FS19 + FS18 (drift fixed in audit Phases 1-2) — BV25 joins after its
      # audit phase (3) fixes its known pre-existing summary drift.
      - name: audit-count guard (#111)
        run: python3 scripts/check_audit_counts.py catgraph/docs/FS19-AUDIT.md catgraph-applied/docs/FS18-AUDIT.md
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      # #85: broken intra-doc links (unresolved / private / redundant) shipped
      # because CI had no doc gate. `-D warnings` fails the build on any of them,
      # keeping docs.rs rendering clean now that the crates are public.
      - run: RUSTDOCFLAGS="-D warnings" cargo doc --workspace --no-deps
      - run: cargo test --workspace
      - run: cargo test -p catgraph --no-default-features
      # #81: the opt-in `serde` feature is off by default, so the runs above
      # never exercise its derives or round-trip tests. This targeted run (plus
      # the clippy pass) keeps the serde surface from rotting silently.
      - run: cargo test -p catgraph-applied -p catgraph-syntax --features serde
      - run: cargo clippy -p catgraph-applied -p catgraph-syntax --features serde --all-targets -- -D warnings
      # #34: the dl examples are self-checking (their main() asserts), but the
      # test runs above only *compile* examples — they never execute main(). Run
      # each so a wrong-value regression fails CI, per the issue's acceptance
      # criterion ("each runs green under cargo run --example").
      - run: |
          for ex in para_walkthrough weight_tying free_monad_basics architecture_unrollers; do
            cargo run -q -p catgraph-dl --example "$ex"
          done

  # #11: the slow BV 2025 Prop 3.14 acceptance fixture
  # (euler_char_identity::fixture_3_5point_path_t_2_5) is ignored under
  # debug_assertions ("30s release / 15+ min debug"), so the debug
  # `cargo test --workspace` above never exercises it. This targeted
  # release run covers it. Deliberately NOT `--workspace --release --
  # --ignored`: #14's interchange proptest is now un-ignored and gating, but the
  # cc_completeness_tracking_* diagnostics (incomplete-by-design per #15's
  # functorial-terminal resolution; KB feasibility spike #57) and the #14
  # mid-layer zero-source (η) known-gap follow-up test remain ignored — the
  # depth_3/4 trackers and the η test FAIL by design.
  release-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test -p catgraph-magnitude --release --test euler_char_identity
